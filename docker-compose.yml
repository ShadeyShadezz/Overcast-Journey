services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      # Optionally set TURN/STUN servers for production via env
      - VITE_ICE_SERVERS=${VITE_ICE_SERVERS}
    restart: unless-stopped

  # Optional coturn service (example). Configure credentials and options before using.
  # This service is placed in the "coturn" profile so it does NOT start by default
  # (faster startup). Start it with `docker compose --profile coturn up -d` when needed.
  coturn:
    image: instrumentisto/coturn
    profiles: ["coturn"]
    restart: unless-stopped
    ports:
      - '3478:3478'
      - '3478:3478/udp'
    environment:
      - REALM=overcastjourney
    # NOTE: Configure TURN users/credentials for prod.

  # Optional Postgres for Prisma signaling DB (anon room uniqueness).
  # Start with `docker compose --profile postgres up -d`.
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: overcastjourney
      POSTGRES_USER: overcast
      POSTGRES_PASSWORD: journey123
    ports:
      - '5432:5432'  # Local dev access
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
