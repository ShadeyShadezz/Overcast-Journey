version: '3.8'
services:
  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      # Optionally set TURN/STUN servers for production via env
      - VITE_ICE_SERVERS=${VITE_ICE_SERVERS}
    restart: unless-stopped

  # Optional coturn service (example). Configure credentials and options before using.
  coturn:
    image: instrumentisto/coturn
    restart: unless-stopped
    ports:
      - '3478:3478'
      - '3478:3478/udp'
      - '49152-65535:49152-65535/udp'
    environment:
      - REALM=overcastjourney
    # NOTE: You must configure TURN users and secure this service for production.
